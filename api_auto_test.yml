name: API自动化测试CI流程

# 触发条件：推代码到main分支、手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 手动触发（面试演示用）

jobs:
  run-api-tests:
    runs-on: ubuntu-latest  # 运行环境（Linux）
    steps:
      # 步骤1：拉取代码到CI服务器
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 步骤2：配置Python环境（和本地一致）
      - name: 安装Python 3.13.0
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.0'

      # 步骤3：安装项目依赖
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 安装allure（生成可视化报告）
          sudo apt-get update && sudo apt-get install -y allure

      - name: 清理所有历史Allure数据
        run: |
          rm -rf ./allure-results ./allure-report

      # 步骤4：执行所有API测试用例（关键：匹配你的文件命名）
      - name: 运行API自动化测试
        run: |
          # 执行当前目录下所有test_开头/xxx_api.py的用例，生成allure报告数据
          pytest ./ --alluredir=./allure-results -v
        # 即使个别用例失败，CI流程也继续（避免一个用例失败导致报告生成失败）
        continue-on-error: false

      # 步骤5：生成Allure测试报告
      - name: 生成Allure报告
        run: allure generate ./allure-results -o ./allure-report --clean
        # 测试用例失败时，仍生成报告（方便排查）
        if: always()

      # 步骤6：上传报告（面试时可下载展示）
      - name: 上传测试报告产物
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: ./allure-report
        if: always()